<div class="chat-header">
    <div class="platform-icons">
        <button class="platform-btn whatsapp-btn" title="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </button>
        <button class="platform-btn chatgpt-btn" title="ChatGPT">
            <i class="fas fa-robot"></i>
        </button>
        <button class="platform-btn gemini-btn" title="Gemini">
            <i class="fab fa-google"></i>
        </button>
        <button class="platform-btn perplexity-btn" title="Perplexity">
            <i class="fas fa-magnifying-glass"></i>
        </button>
        <button class="platform-btn twitter-btn" title="X / Twitter">
            <i class="fab fa-twitter"></i>
        </button>
    </div>

    <button class="close-chat-btn" (click)="closeChat.emit()">
        <i class="fas fa-times"></i>
    </button>
</div>

<div class="chat-messages">
    <!-- @for (message of messages(); track $index) {
    <div class="chat-message" [class.bot]="message.type === 'bot'" [class.user]="message.type === 'user'">
        {{ message.text }}
    </div>
    } -->
</div>

<div class="chat-input-area">
    <input type="text" class="chat-input" placeholder="Type a message..." [value]="currentMessage()"
        (input)="currentMessage.set($any($event.target).value)" (keypress)="handleKeyPress($event)">
    <button class="chat-send-btn" (click)="sendMessage()">
       <i class="fa-solid fa-circle"></i>
    </button>
</div>
