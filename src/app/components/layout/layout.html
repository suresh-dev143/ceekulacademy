<div class="district-layout" [class.sidebar-active]="mobileSidebarOpen()">
    <app-navbar #navbar></app-navbar>

    <div class="layout-columns">


        <!-- Left Column (Sidebar) -->
        @if (showLeftSidebar) {
        <aside class="col-left" [class.active]="mobileSidebarOpen()" [class.collapsed]="leftCollapsed()">
            @if (!leftCollapsed()) {
            <button class="toggle-sidebar-btn left" (click)="toggleLeft()">
                ◀
            </button>
            }
            @if (leftCollapsed()) {
            <button class="expand-sidebar-btn left" (click)="expandLeft()">
                ▶
            </button>
            }

            <div class="sidebar-content">
                @if (customLeftSidebar) {
                <ng-content select="[slot=left-panel]"></ng-content>
                } @else {
                <app-sidebar-left [collapsed]="leftCollapsed()"></app-sidebar-left>
                }
            </div>
        </aside>
        }

        <!-- Center Column (Main Content) -->
        <main class="col-center" [class.left-collapsed]="leftCollapsed()" [class.right-collapsed]="rightCollapsed()">
            @if (showSearch) {
            <div class="center-search-bar">
                <app-global-search [localPlaceholder]="localPlaceholder"></app-global-search>
            </div>
            }
            <ng-content></ng-content>
        </main>

        <!-- Right Column (Chat/Info) -->
        @if (showRightSidebar) {
        <aside class="col-right" [class.collapsed]="rightCollapsed()" [class.active]="mobileRightSidebarOpen()">
            @if (!rightCollapsed()) {
            <button class="toggle-sidebar-btn right" (click)="toggleRight()">
                ▶
            </button>
            }
            @if (rightCollapsed()) {
            <button class="expand-sidebar-btn right" (click)="expandRight()">
                ◀
            </button>
            }

            <div class="sidebar-content" [class.hidden]="rightCollapsed()">
                <ng-content select="[slot=right-panel]"></ng-content>
                <app-chat-panel (closeChat)="toggleMobileRightSidebar()"></app-chat-panel>
            </div>
        </aside>
        }

        <!-- Overlay for mobile sidebar -->
        @if (mobileSidebarOpen()) {
        <div class="sidebar-overlay" (click)="toggleMobileSidebar()"></div>
        }
        @if (mobileRightSidebarOpen()) {
        <div class="sidebar-overlay" (click)="toggleMobileRightSidebar()"></div>
        }

        <!-- Global toast notifications -->
        <app-toast></app-toast>

        <!-- Mobile Bottom Navigation -->
        <div class="mobile-bottom-nav">
            <button class="nav-item" (click)="navbar.toggleMenu()">

                <span>&#x2B24;</span>
            </button>
            <button class="nav-item" (click)="toggleMobileSidebar()">

                <span>&#x2B24;</span>
            </button>

            <button class="nav-item">

                <span>&#x2B24;</span>
            </button>
            <button class="nav-item" (click)="toggleMobileRightSidebar()">

                <span>&#x2B24;</span>
            </button>
        </div>
    </div>
</div>
