<div class="course-form-container">
    <div class="form-header">
        <h2 class="form-title">{{ course ? 'Edit Course' : 'Create New Course' }}</h2>
        <button class="close-btn" (click)="cancel.emit()">CLOSE <i class="fas fa-times"></i></button>
    </div>

    <form [formGroup]="courseForm" (ngSubmit)="onSubmit()" class="modern-form">
        <div class="form-group">
            <label for="title">Course Title</label>
            <input id="title" type="text" formControlName="title" placeholder="e.g., Master Advanced Web Development">
            <div class="error-msg" *ngIf="courseForm.get('title')?.touched && courseForm.get('title')?.invalid">
                Title must be at least 5 characters long.
            </div>
        </div>

        <div class="form-row">
            <div class="form-group half">
                <label for="category">Category</label>
                <select id="category" formControlName="category">
                    <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                </select>
            </div>
            <div class="form-group half">
                <label for="level">Level</label>
                <select id="level" formControlName="level">
                    <option *ngFor="let lvl of levels" [value]="lvl">{{ lvl }}</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" formControlName="description" rows="4"
                placeholder="Briefly describe what students will learn..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group half">
                <label for="mode">Mode</label>
                <select id="mode" formControlName="mode">
                    <option *ngFor="let m of modes" [value]="m">{{ m }}</option>
                </select>
            </div>
            <div class="form-group half">
                <label for="duration">Duration</label>
                <input id="duration" type="text" formControlName="duration" placeholder="e.g., 6 Weeks / 40 Hours">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group half">
                <label for="pricing">Pricing</label>
                <select id="pricing" formControlName="pricing">
                    <option *ngFor="let p of pricingOptions" [value]="p">{{ p }}</option>
                </select>
            </div>
            <div class="form-group half">
                <label for="status">Initial Status</label>
                <select id="status" formControlName="status">
                    <option value="Draft">Draft</option>
                    <option value="Published">Published</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-secondary" (click)="cancel.emit()">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="courseForm.invalid">
                {{ course ? 'Update Course' : 'Create Course' }}
            </button>
        </div>
    </form>
</div>
