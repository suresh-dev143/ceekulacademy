<nav class="navbar" [class.dark-landing]="isLandingPage()">
  <div class="navbar__container">
    <!-- Logo -->
    <div class="navbar__logo">
      <a routerLink="/" class="navbar__logo-link">
      </a>
    </div>
    <!-- Ceekul Civilisation Title (Landing page only) -->
    @if (isLandingPage()) {
    <div class="navbar__brand-title">
      <h1 aria-label="CEEKUL CIVILISATION">CEEKUL CIVILISATION</h1>
    </div>
    } @else {
    <!-- Digital Life Title + Personal Navigation (Desktop only) -->
    <div class="navbar__personal">
      <a routerLink="/personal/digital-life" class="navbar__digital-title">Digital Life</a>
      @if (navLinks().length > 0) {
      <nav class="navbar__personal-nav" [class.navbar__personal-nav--open]="isMobileMenuOpen()">
        @for (link of navLinks(); track link.route) {
        <a [routerLink]="link.route" routerLinkActive="navbar__personal-nav-link--active"
          [routerLinkActiveOptions]="{ exact: link.exact || link.route === '/' }"
          class="navbar__personal-nav-link" (click)="closeMobileMenu()">
          {{ link.label }}
        </a>
        }
      </nav>
      }
    </div>
    }
    <!-- App User Profile Section -->
    <div class="navbar__actions">
    </div>

    <!-- Mobile Menu Toggle (Personal page only) -->
    @if (!isLandingPage()) {
    <button class="navbar__mobile-toggle" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <span class="navbar__hamburger" [class.navbar__hamburger--open]="isMobileMenuOpen()"></span>
    </button>
    }

  </div>
</nav>
