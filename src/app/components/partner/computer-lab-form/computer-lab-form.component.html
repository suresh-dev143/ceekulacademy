<div class="form-container">
    <div class="form-header">
      <h2 class="section-title" style="margin: 0;">{{ editData ? 'Edit Computer Lab' : 'Add New Computer Lab' }}</h2>
      <button class="btn-outline" (click)="close.emit()" type="button"><i class="fas fa-times"></i> Close</button>
    </div>
  
    <form [formGroup]="labForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div>
          <label class="form-label">Lab Name *</label>
          <input type="text" class="form-control" formControlName="name" placeholder="e.g., AI Research Lab" [class.is-invalid]="labForm.get('name')?.invalid && labForm.get('name')?.touched">
          <app-form-validation-error [control]="labForm.get('name')" label="Lab Name"></app-form-validation-error>
        </div>
        <div>
          <label class="form-label">Internal ID / Code *</label>
          <input type="text" class="form-control" formControlName="id" placeholder="e.g., lab-203" [class.is-invalid]="labForm.get('id')?.invalid && labForm.get('id')?.touched">
          <app-form-validation-error [control]="labForm.get('id')" label="Internal ID"></app-form-validation-error>
        </div>
      </div>
  
      <div class="form-group grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div>
          <label class="form-label">Internet Speed *</label>
          <input type="text" class="form-control" formControlName="internetSpeed" placeholder="e.g., 10 Gbps Fiber" [class.is-invalid]="labForm.get('internetSpeed')?.invalid && labForm.get('internetSpeed')?.touched">
          <app-form-validation-error [control]="labForm.get('internetSpeed')" label="Internet Speed"></app-form-validation-error>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
                <label class="form-label">Workstations *</label>
                <input type="number" class="form-control" formControlName="workstations" placeholder="15" [class.is-invalid]="labForm.get('workstations')?.invalid && labForm.get('workstations')?.touched">
                <app-form-validation-error [control]="labForm.get('workstations')" label="Workstations"></app-form-validation-error>
            </div>
            <div>
                <label class="form-label">Capacity *</label>
                <input type="number" class="form-control" formControlName="capacity" placeholder="15" [class.is-invalid]="labForm.get('capacity')?.invalid && labForm.get('capacity')?.touched">
                <app-form-validation-error [control]="labForm.get('capacity')" label="Capacity"></app-form-validation-error>
            </div>
        </div>
      </div>
  
      <h3 class="section-title" style="font-size: 1rem; margin-top: 1.5rem;">Software Available (Comma separated)</h3>
      <div class="nested-section">
        <div class="form-group">
          <label class="form-label">Software List</label>
          <input type="text" class="form-control" formControlName="softwareAvailable" placeholder="TensorFlow, PyTorch, Jupyter Notebooks">
        </div>
      </div>
  
      <h3 class="section-title" style="font-size: 1rem; margin-top: 1.5rem; display: flex; justify-content: space-between;">
        Availability Schedule
        <button type="button" class="btn-outline" (click)="addScheduleSlot()">+ Add Schedule Day</button>
      </h3>
      <div class="nested-section" formArrayName="availabilitySchedule">
        <div *ngFor="let slot of availabilitySchedule.controls; let i=index" [formGroupName]="i" class="schedule-slot-group" style="border: 1px solid #222; padding: 1rem; margin-bottom: 1rem; background: #080808;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid #222; padding-bottom: 0.5rem;">
              <div class="schedule-header-actions">
                <span style="color: #ef9d57; font-weight: bold; font-size: 0.8rem; margin-right: 1rem;">DAY #{{ i + 1 }}</span>
                <button type="button" class="btn-outline" (click)="applyToWeek(i)" style="font-size: 0.65rem; padding: 0.2rem 0.5rem;"><i class="fas fa-copy"></i> Apply to Week</button>
              </div>
              <button type="button" class="btn-danger" (click)="removeScheduleSlot(i)" title="Remove Slot" style="margin: 0; padding: 0.2rem 0.5rem;"><i class="fas fa-trash"></i> Remove</button>
            </div>
    
            <div class="schedule-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
            <div>
              <label class="form-label">Day *</label>
              <select class="form-control" formControlName="day">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
              </select>
            </div>
            <div>
              <label class="form-label">Specific Date</label>
              <input type="date" class="form-control" formControlName="date">
            </div>
            <div>
              <label class="form-label">Overall Status *</label>
              <select class="form-control" formControlName="status">
                <option value="Available">Available</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Closed">Closed</option>
              </select>
            </div>
          </div>

          <div class="slot-grid-section">
            <label class="form-label" style="margin-top: 1rem;"><i class="fas fa-clock"></i> Hourly Availability (Click to toggle status, then select to edit pricing)</label>
            <div class="slot-grid-container" formArrayName="slots">
              <div *ngFor="let s of getSlots(i).controls; let sid = index" [formGroupName]="sid" class="slot-item" 
                  [class.available]="s.get('status')?.value === 'Available'"
                  [class.booked]="s.get('status')?.value === 'Booked'"
                  [class.closed]="s.get('status')?.value === 'Closed'"
                  [class.active]="activeSlot()?.dayIndex === i && activeSlot()?.slotIndex === sid"
                  (click)="toggleSlot(i, sid)">
                {{ s.get('time')?.value.split('-')[0] }}
              </div>
            </div>
          </div>

          <!-- Active Slot Editor -->
          <div *ngIf="activeSlot()?.dayIndex === i" class="nested-section animate-fade-in" style="margin-top: 1rem; border: 1px dashed #ef9d57; background: rgba(239, 157, 87, 0.05);">
            <div class="form-group">
                <h5 style="font-size: 0.8rem; color: #ef9d57; margin-bottom: 0.5rem; text-transform: uppercase;">
                    <i class="fas fa-edit"></i> Pricing for {{ getSlots(i).at(activeSlot()!.slotIndex).get('time')?.value }}
                </h5>
                <div [formGroup]="$any(getSlots(i).at(activeSlot()!.slotIndex))">
                    <div formGroupName="pricing" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label class="form-label">Slot Pricing Type</label>
                            <select class="form-control" formControlName="type">
                                <option value="Free">Free</option>
                                <option value="Share">Share (%)</option>
                                <option value="Fixed">Fixed Amount</option>
                            </select>
                        </div>
                        <div *ngIf="getSlots(i).at(activeSlot()!.slotIndex).get('pricing.type')?.value !== 'Free'" class="animate-fade-in">
                            <label class="form-label">{{ getSlots(i).at(activeSlot()!.slotIndex).get('pricing.type')?.value === 'Share' ? 'Share % *' : 'Rate (₹/hr) *' }}</label>
                            <input type="number" class="form-control" formControlName="amount">
                        </div>
                    </div>
                </div>
            </div>
          </div>

          <!-- Bulk Pricing Section -->
          <div formGroupName="pricing" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 1rem; margin-top: 1.5rem; border-top: 2px solid #222; padding-top: 1.2rem;">
            <div>
              <label class="form-label">Day Default Pricing</label>
              <select class="form-control" formControlName="type">
                <option value="Free">Free</option>
                <option value="Share">Share (%)</option>
                <option value="Fixed">Fixed Amount</option>
              </select>
            </div>
            <div *ngIf="getPricingType(i) !== 'Free'">
              <label class="form-label">{{ getPricingType(i) === 'Share' ? 'Default Share %' : 'Default Rate (₹/hr)' }}</label>
              <input type="number" class="form-control" formControlName="amount">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button type="button" class="btn-outline" (click)="applyPriceToAllSlots(i)" style="width: 100%; white-space: nowrap;">
                    <i class="fas fa-check-double"></i> Apply to All Slots
                </button>
            </div>
          </div>
          <div style="margin-top: 1rem;">
            <label class="form-label">Day Notes</label>
            <input type="text" class="form-control" formControlName="notes" placeholder="e.g. Morning session special">
          </div>
        </div>
      </div>
  
      <div style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 1rem; text-align: right;">
        <button type="submit" class="btn-primary" [disabled]="isLoading() || labForm.invalid">
          <i class="fas fa-spinner fa-spin" *ngIf="isLoading()"></i>
          <span *ngIf="!isLoading()">{{ editData ? 'Save Changes' : 'Add Computer Lab' }}</span>
        </button>
      </div>
    </form>
  </div>
