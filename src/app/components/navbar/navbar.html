<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-brand" (click)="closeMenu()">
      <div class="logo-text">
        <div class="logo-main">CEEKUL MISSION</div>
      </div>
    </a>
    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<!-- Drawn outside <nav> so backdrop-filter doesn't trap position:fixed -->
<div class="navbar-menu" [class.active]="isMenuOpen">
  <div class="close-btn">
    <button class="close-menu-btn" (click)="closeMenu()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link" (click)="closeMenu()">Home</a>
  <a routerLink="/about" routerLinkActive="active" class="nav-link" (click)="closeMenu()">About</a>
  <a routerLink="/programs" routerLinkActive="active" class="nav-link" (click)="togglePrograms($event)">Projects</a>
  <a routerLink="/contribute" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Contribute</a>
  <a routerLink="/activate" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Activate</a>
  <a routerLink="/invest" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Allocate</a>
  <a routerLink="/donate" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Donate</a>
  <a routerLink="/contact" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Contact</a>
</div>

<!-- Backdrop overlay -->
<div class="menu-backdrop" [class.active]="isMenuOpen" (click)="closeMenu()"></div>
