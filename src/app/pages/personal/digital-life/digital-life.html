<div class="activities-container">
  <div class="activities-header">
    <a routerLink="/personal/my-activities"><span>←</span></a>
  </div>
  <div class="activities-links">

    @for (section of sections; track section.title) {
    <a [routerLink]="section.route" class="activity-link-card">
      <div class="activity-link-content">
        <h2>{{ section.title }}</h2>
      </div>
    </a>
    }
  </div>
</div>
