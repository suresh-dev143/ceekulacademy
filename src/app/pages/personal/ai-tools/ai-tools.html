<div class="ai-tools-panel">

  @if (!isPersonalPage()) {
    <div class="chat-panel__header">
      <h3>Content Creation Tool</h3>
      
    </div> 
  <div class="tool-sublist">
    @for (bt of blockTypes; track bt.type) {
    <a class="subtool-btn" [routerLink]="['/personal/create']" [queryParams]="{ block: bt.type }"
      (click)="$event.stopPropagation()">
      <span class="subtool-btn__label">{{ bt.label }}</span>
    </a>
    <div class="subtool-link" >
    @for(tool of bt.tools; track tool){
    
      <a class="subtool-btn" [href]="tool.link" target="_blank" rel="noopener noreferrer">  <span class="subtool-btn__label">{{ tool.label }}</span></a>
     
    }
    </div>
    }
  </div>

  <!-- ── Discussions ── -->
  @if (!isCreatePage()) {
  <div class="chat-panel">
    <div class="chat-panel__header">
      <h3>Discussion</h3>
      <span class="status-badge">
        <span class="status-dot"></span>
        Live
      </span>
    </div>
    <app-discussion-chat></app-discussion-chat>
    
    <!-- ── Chat Input ── -->
    <div class="chat-input-container">
      <input 
        class="chat-input" 
        type="text" 
        placeholder="Type your message…" 
        (keyup.enter)="sendMessage()"
        [(ngModel)]="messageText" />
      <button 
        class="chat-send-btn" 
        (click)="sendMessage()"
        [disabled]="!messageText()?.trim()">
        Send
      </button>
    </div>
