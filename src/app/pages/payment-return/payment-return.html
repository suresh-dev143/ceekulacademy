<div class="payment-return">
  <div class="payment-return__card payment-return__card--processing">
    <div class="payment-return__icon payment-return__icon--error">!</div>
    <h1 class="payment-return__title">Provider Flow Disabled</h1>
    <p class="payment-return__body">
      Ceekul is currently running Experimental Internal Simulation only. External provider verification is inactive.
    </p>
    <p class="payment-return__note">
      Use the simulation contribution flow to create Internal Utility Units for ledger, UCRS, and workflow testing.
    </p>
    <button class="payment-return__btn" (click)="goToSimulation()">
      Open Simulation Flow
    </button>
  </div>
</div>
