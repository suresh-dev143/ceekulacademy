<app-layout>
    <div class="home-hub-container">
        <!-- Header Section -->
        <app-profile-summary [user]="userData" (viewProfile)="handleViewProfile()" (editProfile)="handleEditProfile()"
            (logout)="handleLogout()">
        </app-profile-summary>

        <!-- Need Intelligence Signal — Layer 2 -->
        @if (topNeed()) {
        <div class="need-signal-strip"
             [class.urgency-high]="topNeed()!.urgency === 'high'"
             [class.urgency-medium]="topNeed()!.urgency === 'medium'"
             [class.urgency-low]="topNeed()!.urgency === 'low'">
            <span class="ns-icon">{{ urgencyIcon(topNeed()!.urgency) }}</span>
            <div class="ns-body">
                <span class="ns-title">{{ topNeed()!.title }}</span>
                <span class="ns-explain">{{ topNeed()!.explanation }}</span>
            </div>
            <span class="ns-badge">{{ topNeed()!.urgency }}</span>
        </div>
        }
        @if (loading()) {
        <div class="need-signal-loading">Syncing intelligence...</div>
        }

        <div class="hub-content-grid">
            <!-- Main Content Column (Integrated in Center) -->
            <div class="hub-main-column">
                <!-- Courses Section -->
                <app-course-cards [courses]="userCourses"></app-course-cards>

                <!-- Activities Section -->
                <app-activities-summary [activities]="fallbackActivities"></app-activities-summary>

                <!-- Roles & Availability Section -->
                <app-roles-availability [roles]="userRoles" [availability]="availabilityInfo">
                </app-roles-availability>

                <!-- Notifications Section -->
                <app-notifications-list [notifications]="userNotifications"></app-notifications-list>
            </div>
        </div>
    </div>
</app-layout>
